<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - IDENTITY Foundation</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css">
  <style>
    body {
      background: #f8f9fa;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(128,0,0,0.12);
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
    }
    .login-box h2 {
      color: #800000;
      margin-bottom: 24px;
      text-align: center;
    }
    .form-control:focus {
      border-color: #800000;
      box-shadow: 0 0 0 2px #80000033;
    }
    .btn-primary {
      background: #800000;
      border-color: #800000;
      font-weight: 600;
      border-radius: 8px;
    }
    .btn-primary:hover {
      background: #a83232;
      border-color: #a83232;
    }
    .login-logo {
      display: block;
      margin: 0 auto 18px auto;
      height: 60px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="D:\Identity Foundation Website\Identity Foundation logo.png" alt="Logo" class="login-logo">
    <h2><i class="fa-solid fa-user-shield"></i> Admin Login</h2>
    <form id="loginForm">
      <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login</button>
      <button type="button" class="btn btn-link w-100 mt-2" id="resetBtn">Reset Password</button>
    </form>
    <div id="loginMsg" class="mt-3 text-danger text-center" style="display:none;"></div>
    <!-- Reset Password Modal -->
    <div class="modal fade" id="resetModal" tabindex="-1" aria-labelledby="resetModalLabel" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="resetModalLabel">Reset Password</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <p>To reset your password, please contact the site administrator at <b>indentity.foundation@gmail.com</b>.</p>
            <p class="small text-muted">(Demo: Password reset is not available online.)</p>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var username = document.getElementById('username').value;
      var password = document.getElementById('password').value;
      var loginMsg = document.getElementById('loginMsg');
      // Demo credentials: admin / admin123
      if(username === 'admin' && password === 'admin123') {
        sessionStorage.setItem('isAdminLoggedIn', 'true');
        window.location.href = 'admin.html';
      } else {
        loginMsg.textContent = 'Invalid username or password.';
        loginMsg.style.display = 'block';
      }
    });

    // Reset Password button logic
    document.getElementById('resetBtn').addEventListener('click', function() {
      var modal = new bootstrap.Modal(document.getElementById('resetModal'));
      modal.show();
    });
  </script>
</body>
</html>
